<!DOCTYPE html>
<html>
<head>
  <title>ChessBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
</head>
<body>
  <div style="max-width: 100%;max-height:100%;margin-top: 0;">
    <div style="display: flex; align-items: center;text-align: center;justify-content: center;">
       <svg style="cursor: help;" id="green-pawn" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="32px" height="32px"><linearGradient id="UpcASOqyHrPhCm1EGzxHba" x1="12.014" x2="30.756" y1="23.537" y2="42.279" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#25b03b"/><stop offset=".288" stop-color="#22a637"/><stop offset=".774" stop-color="#188c2b"/><stop offset="1" stop-color="#137d25"/></linearGradient><path fill="url(#UpcASOqyHrPhCm1EGzxHba)" d="M28.001,19h-8.002c0,16.944-10,9.713-10,23c0,0,0.546,2,14.001,2c13.455,0,14.001-2,14.001-2 C38.001,28.713,28.001,35.944,28.001,19z"/><linearGradient id="UpcASOqyHrPhCm1EGzxHbb" x1="14.65" x2="31.973" y1="4.694" y2="22.017" gradientUnits="userSpaceOnUse"><stop offset=".425" stop-color="#25b03b"/><stop offset=".632" stop-color="#20a135"/><stop offset="1" stop-color="#137d25"/></linearGradient><path fill="url(#UpcASOqyHrPhCm1EGzxHbb)" d="M28.289,15.524 C29.936,14.243,31,12.248,31,10c0-3.866-3.134-7-7-7s-7,3.134-7,7c0,2.248,1.064,4.243,2.711,5.524 c-1.229,0.826-2.459,1.652-3.689,2.478c0.03,0.428,0.113,0.997,0.332,1.634c0.197,0.573,0.446,1.032,0.663,1.371l6.984-0.01 l6.981,0.01c0.217-0.339,0.466-0.798,0.663-1.371c0.219-0.637,0.302-1.206,0.332-1.634C30.748,17.176,29.519,16.35,28.289,15.524z"/><path fill="#4ddb63" d="M24.683,4.727c0.372,0.973-0.526,2.556-2.006,3.536c-1.48,0.979-2.982,0.984-3.354,0.011 s0.526-2.556,2.006-3.536S24.31,3.753,24.683,4.727z"/></svg>
        <h1 class="font-bold" style="font-size: 30px;">ChessBot</h1>
    </div>

    <p style="font-size: 12px;text-align: center;margin-top: -7px;">Real-time stockfish analyzer for <a href="https://www.chess.com" target="_blank" style="color: #65686d;">chess.com</a></p>
  
    <center>
      <div style="border: 1px solid #00000050;border-radius: 5px;width: 80%;font-size: 12px;margin-top: 7px;">
      
        <div style="margin-top: 8px; margin-bottom: 2px;">
          <div class="stance-picker" id="stance-picker" data-selected="1">
            <button class="stance-btn" data-index="0">
              <span class="stance-label" style="padding-left: 4px;">Defensive</span>
            </button>
            <button class="stance-btn" data-index="1">
              <span class="stance-label">Neutral</span>
            </button>
            <button class="stance-btn" data-index="2">
              <span class="stance-label" style="padding-right: 4px;">Offensive</span>
            </button>
          </div>
        </div>

        <hr style="
            opacity: .2;
            margin-top: 8px;
        ">

        <div style="display: flex; align-items: center; gap: 4px;justify-content: center;padding-left: 8px;padding-right: 8px; margin-bottom: 8px;flex-direction: column;">
          <span id="elo" style="margin-right: 7px;">Engine ELO: 2600</span>
          <input type="range" min="1" max="40" value="16" class="slider-color" id="elo-range">
        </div>
      </div>

      <button class="btn-chess" id="scan-start" style="margin-top: 0.7rem;">Scan Board</button>
    </center>
  </div>

  <script src="popup.js"></script>

  <style>
    html {
      line-height: 1.5;
      -webkit-text-size-adjust: 100%;
      -moz-tab-size: 4;
      tab-size: 4;
      font-feature-settings: normal;
      font-variation-settings: normal;
      -webkit-tap-highlight-color: transparent
    }
  
    blockquote, dd, dl, figure, h1, h2, h3, h4, h5, h6, hr, p, pre { margin: 0 }
    
    body {
      user-select: none;
      background-color: #FFF4E9;
      width: 225px;
      height: 100%;
      padding-bottom: 12.5px;
      font-family: 'Crimson Text', 'Times New Roman', serif;
      font-weight: 600;
      margin: 0;
      line-height: inherit
    }

    /* ── Stance Picker ── */
    .stance-picker {
      position: relative;
      display: flex;
      margin: 0 6px;
      background: #ede4d8;
      border: 1px solid #c8b89a;
      border-radius: 4px;
      overflow: hidden;
      height: 36px;
    }

    /* Sliding thumb */
    .stance-picker::before {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: calc((100% - 6px) / 3);
      height: calc(100% - 6px);
      border-radius: 3px;
      background: var(--thumb-bg, linear-gradient(180deg, #81b64c 0%, #6dac56 100%));
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #d8fa9d, transparent 60%),
        inset 0 -1px 0 #45753c,
        0 1px 3px rgba(0,0,0,0.15);
      transition:
        left 0.25s cubic-bezier(0.4, 0, 0.2, 1),
        background 0.25s ease;
      pointer-events: none;
      z-index: 0;
    }

    .stance-picker[data-selected="0"]::before { left: 3px; --thumb-bg: linear-gradient(180deg, #7bb95e 0%, #5d9948 100%); }
    .stance-picker[data-selected="1"]::before { left: calc((100% - 6px) / 3 + 3px); --thumb-bg: linear-gradient(180deg, #babab9 0%, #979793 100%); }
    .stance-picker[data-selected="2"]::before { left: calc((100% - 6px) / 3 * 2 + 3px); --thumb-bg: linear-gradient(180deg, #c0622a 0%, #a84e1e 100%); }

    .stance-btn {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 1;
      color: #8a7a66;
      font-family: 'Crimson Text', serif;
      font-weight: 600;
      font-size: 11px;
      padding: 0;
      transition: color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .stance-btn:active { transform: scale(0.96); }

    /* Divider lines */
    .stance-btn + .stance-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background: #c8b89a;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    /* Hide divider adjacent to active selection */
    .stance-picker[data-selected="0"] .stance-btn:nth-child(2)::before,
    .stance-picker[data-selected="1"] .stance-btn:nth-child(2)::before,
    .stance-picker[data-selected="1"] .stance-btn:nth-child(3)::before,
    .stance-picker[data-selected="2"] .stance-btn:nth-child(3)::before {
      opacity: 0;
    }

    .stance-icon { font-size: 11px; line-height: 1; }
    .stance-label { line-height: 1; }

    /* Active label highlight */
    .stance-picker[data-selected="0"] .stance-btn:nth-child(1),
    .stance-picker[data-selected="1"] .stance-btn:nth-child(2),
    .stance-picker[data-selected="2"] .stance-btn:nth-child(3) {
      color: #fff;
    }

    /* ── Original styles ── */
    .btn-chess {
      background: linear-gradient(180deg, #81b64c 0%, #7bb964 70%, #6dac56 100%);
      box-shadow: inset 0 .1rem 0 0 color-mix(in srgb, #d8fa9d,transparent 60%),inset 0 .2rem .4rem 0 color-mix(in srgb, #b2e068,transparent 50%),inset 0 -.1rem 0 0 #45753c,inset 0 -.2rem .4rem 0 color-mix(in srgb, #45753c,transparent 50%),0 .1rem .2rem 0 rgba(0,0,0,.14),0 .2rem .4rem 0 rgba(0,0,0,.1);
      width: 80%;
      height: 1.75rem;
      border: none;
      border-radius: 5px;
      font-family: 'Crimson Text', serif;
      font-weight: 600;
      cursor: pointer;
    }
  
    .btn-chess:hover {
      background: linear-gradient(180deg,color-mix(in srgb, #b2e068,transparent 50%) 0%,transparent 100%),linear-gradient(180deg, #81b64c 0%, #7bb964 70%, #6dac56 100%);
    }

    .btn-chess:active { box-shadow: none; }
  
    .slider-color {
      -webkit-appearance: none;
      width: 90%;
      height: 12px;
      border-radius: 5px;
      background: linear-gradient(180deg, #81b64c 0%, #5d9948 100%);
      box-shadow: inset 0 .1rem 0 0 color-mix(in srgb, #d8fa9d,transparent 60%),inset 0 .2rem .4rem 0 color-mix(in srgb, #b2e068,transparent 50%),inset 0 -.1rem 0 0 #45753c,inset 0 -.2rem .4rem 0 color-mix(in srgb, #45753c,transparent 50%),0 .1rem .2rem 0 rgba(0,0,0,.14),0 .2rem .4rem 0 rgba(0,0,0,.1);
      outline: none;
      transition: opacity .15s ease-in-out;
      padding-left: 2px;
    }
  
    .slider-color::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border: 0;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      border: 1.5px solid #80b54b;
    }
  
    .slider-color::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border: 0;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      border: 1.5px solid #80b54b;
    }
  </style>
</body>
</html>
